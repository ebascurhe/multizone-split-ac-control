# Temperature Calibration Automations for Clima
# These automations enable the smart calibration system to learn and adjust AC setpoints

# ==========================================
# CALIBRATION LEARNING CYCLE
# ==========================================

# Main calibration loop - Every 30 seconds
- id: calibration_learning_cycle
  alias: "Calibration: Learning cycle (every 30s)"
  trigger:
    platform: time_pattern
    seconds: "/30"
  condition:
    - condition: state
      entity_id: input_boolean.calibration_learning_enabled
      state: "on"
  action:
    # For each zone, compare AC setpoint with external sensor
    - service: climate.set_temperature
      target:
        entity_id: climate.bedroom_ac
      data:
        temperature: |
          {%- set external_temp = states('sensor.bedroom_temperature') | float -%}
          {%- set setpoint = state_attr('climate.bedroom_ac', 'temperature') | float -%}
          {%- set offset = state_attr('clima.bedroom_calibration', 'offset') | float(0) -%}
          {%- set adjusted = external_temp + offset -%}
          {{ [16, adjusted, 30] | map(float) | list | min | max }}

# ==========================================
# CALIBRATION LEARNING - BEDROOM
# ==========================================

# Record bedroom offset every minute
- id: calibration_record_bedroom
  alias: "Calibration: Record bedroom offset"
  trigger:
    platform: time_pattern
    minutes: "/1"
  condition:
    - condition: state
      entity_id: input_boolean.calibration_learning_enabled
      state: "on"
    - condition: state
      entity_id: climate.bedroom_ac
      state: "heating"
  action:
    - service: climate.set_temperature
      target:
        entity_id: climate.bedroom_ac
      data:
        # Auto-adjust setpoint based on learned offset
        temperature: |
          {%- set target = states('input_number.bedroom_target') | float(22) -%}
          {%- set current_offset = state_attr('climate.bedroom_ac', 'current_offset') | float(0) -%}
          {%- set external = states('sensor.bedroom_temperature') | float -%}
          {%- set diff = target - external -%}
          {%- if diff | abs > 0.5 -%}
            {{ target + current_offset }}
          {%- else -%}
            {{ state_attr('climate.bedroom_ac', 'temperature') | float }}
          {%- endif %}

