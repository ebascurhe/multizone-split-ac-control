set_zone_temperature:
  name: Set Zone Temperature
  description: Set the target temperature for a specific climate zone
  fields:
    zone_id:
      name: Zone ID
      description: The ID of the zone to control
      required: true
      example: "bedroom"
      selector:
        text:
    temperature:
      name: Temperature
      description: Target temperature in Celsius (16-30°C)
      required: true
      example: 22
      selector:
        number:
          min: 16
          max: 30
          step: 0.1
          unit_of_measurement: "°C"

toggle_zone:
  name: Toggle Zone
  description: Enable or disable AC for a specific zone
  fields:
    zone_id:
      name: Zone ID
      description: The ID of the zone to control
      required: true
      example: "bedroom"
      selector:
        text:
    enabled:
      name: Enabled
      description: Whether to enable or disable the zone
      required: true
      example: true
      selector:
        boolean:
