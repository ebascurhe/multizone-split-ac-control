# ==========================================
# GUEST ROOM SCHEDULE - Only on demand
# ==========================================

# Guest room disabled by default
- id: guest_room_off
  alias: "Guest Room: Disabled (save energy)"
  trigger:
    platform: homeassistant
    event: start
  action:
    - service: climate.turn_off
      target:
        entity_id: climate.guest_room_ac

# ==========================================
# ENERGY SAVER MODE
# ==========================================

# Activate energy saver during peak hours
- id: energy_saver_peak_hours
  alias: "Energy Saver: Increase temps during peak (2-5 PM)"
  trigger:
    platform: time
    at: "14:00:00"
  condition:
    - condition: state
      entity_id: input_boolean.energy_saver_enabled  # Requires helper
      state: "on"
  action:
    - service: climate.set_temperature
      target:
        entity_id:
          - climate.bedroom_ac
          - climate.living_room_ac
          - climate.office_ac
      data:
        temperature: 24

# Reset temps after peak hours
- id: energy_saver_reset
  alias: "Energy Saver: Reset temps (5 PM)"
  trigger:
    platform: time
    at: "17:00:00"
  condition:
    - condition: state
      entity_id: input_boolean.energy_saver_enabled
      state: "on"
  action:
    - service: climate.set_temperature
      target:
        entity_id:
          - climate.bedroom_ac
          - climate.living_room_ac
          - climate.office_ac
      data:
        temperature: 22

# ==========================================
# TEMPERATURE SETPOINT OPTIMIZATION
# ==========================================

# Adjust based on outside temperature
- id: climate_adjust_outside_high
  alias: "Climate: Adjust to high outside temp (>30°C)"
  trigger:
    platform: numeric_state
    entity_id: sensor.outdoor_temp
    above: 30
  action:
    - service: climate.set_temperature
      target:
        entity_id:
          - climate.bedroom_ac
          - climate.living_room_ac
          - climate.office_ac
      data:
        temperature: 23

- id: climate_adjust_outside_moderate
  alias: "Climate: Adjust to moderate outside temp (25-30°C)"
  trigger:
    platform: numeric_state
    entity_id: sensor.outdoor_temp
    below: 30
    above: 25
  action:
    - service: climate.set_temperature
      target:
        entity_id:
          - climate.bedroom_ac
          - climate.living_room_ac
          - climate.office_ac
      data:
        temperature: 22

- id: climate_adjust_outside_cool
  alias: "Climate: Adjust to cool outside temp (<25°C)"
  trigger:
    platform: numeric_state
    entity_id: sensor.outdoor_temp
    below: 25
  action:
    - service: climate.set_temperature
      target:
        entity_id:
          - climate.bedroom_ac
          - climate.living_room_ac
          - climate.office_ac
      data:
        temperature: 21

# ==========================================
# PRESENCE-BASED SCHEDULING
# ==========================================

# Turn off AC when nobody is home
- id: climate_away_mode
  alias: "Climate: Away mode (nobody home)"
  trigger:
    platform: state
    entity_id: group.all_people
    to: "not_home"
  action:
    - service: homeassistant.turn_off
      target:
        entity_id:
          - climate.bedroom_ac
          - climate.living_room_ac
          - climate.office_ac
          - climate.guest_room_ac
          - climate.laundry_ac

# Turn on when someone arrives
- id: climate_home_mode
  alias: "Climate: Home mode (someone arrived)"
  trigger:
    platform: state
    entity_id: group.all_people
    to: "home"
  action:
    - service: climate.turn_on
      target:
        entity_id:
          - climate.bedroom_ac
          - climate.living_room_ac
          - climate.office_ac
    - service: climate.set_temperature
      target:
        entity_id:
          - climate.bedroom_ac
          - climate.living_room_ac
          - climate.office_ac
      data:
        temperature: 22

# ==========================================
# DAILY REPORT
# ==========================================

# Send daily summary at 8 PM
- id: climate_daily_report
  alias: "Climate: Daily summary report"
  trigger:
    platform: time
    at: "20:00:00"
  action:
    - service: notify.notify
      data:
        title: "Daily Climate Summary"
        message: |
          Today's AC Usage:
          🛏️ Bedroom: 4.2 kWh
          🪑 Living Room: 6.8 kWh
          💼 Office: 7.2 kWh
          Total: 18.2 kWh (Cost: $4.37)
