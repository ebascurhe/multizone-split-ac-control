# Example Schedules for Clima Integration
# Add these to your automations.yaml to enable automatic scheduling

# ==========================================
# BEDROOM SCHEDULE
# ==========================================

# Morning start - Bedroom cooling
- id: bedroom_morning_start
  alias: "Bedroom: Morning cooling (8 AM)"
  trigger:
    platform: time
    at: "08:00:00"
  condition:
    - condition: state
      entity_id: binary_sensor.workday  # Only on workdays (requires Workday integration)
      state: "on"
  action:
    - service: climate.turn_on
      target:
        entity_id: climate.bedroom_ac
    - service: climate.set_temperature
      target:
        entity_id: climate.bedroom_ac
      data:
        temperature: 22

# Evening increase - Bedroom
- id: bedroom_evening_increase
  alias: "Bedroom: Evening cooling (8 PM)"
  trigger:
    platform: time
    at: "20:00:00"
  action:
    - service: climate.set_temperature
      target:
        entity_id: climate.bedroom_ac
      data:
        temperature: 20

# Night shutdown - Bedroom
- id: bedroom_night_shutdown
  alias: "Bedroom: Turn off (7 AM)"
  trigger:
    platform: time
    at: "07:00:00"
  condition:
    - condition: state
      entity_id: binary_sensor.workday
      state: "on"
  action:
    - service: climate.turn_off
      target:
        entity_id: climate.bedroom_ac

# Weekend bedroom schedule
- id: bedroom_weekend
  alias: "Bedroom: Weekend schedule"
  trigger:
    platform: time
    at: "09:00:00"
  condition:
    - condition: state
      entity_id: binary_sensor.workday
      state: "off"
  action:
    - service: climate.turn_on
      target:
        entity_id: climate.bedroom_ac
    - service: climate.set_temperature
      target:
        entity_id: climate.bedroom_ac
      data:
        temperature: 22

