    at: "23:00:00"
  condition:
    - condition: state
      entity_id: binary_sensor.workday
      state: "on"
  action:
    - service: climate.turn_off
      target:
        entity_id: climate.office_ac

# ==========================================
# WEEKEND HEATING SCHEDULE
# ==========================================

# Weekend relaxed heating
- id: heating_weekend
  alias: "Winter: Weekend heating (9 AM)"
  trigger:
    platform: time
    at: "09:00:00"
  condition:
    - condition: state
      entity_id: binary_sensor.workday
      state: "off"
    - condition: numeric_state
      entity_id: sensor.outdoor_temp
      below: 15
  action:
    - service: climate.set_temperature
      target:
        entity_id:
          - climate.bedroom_ac
          - climate.living_room_ac
          - climate.master_bedroom_ac
      data:
        temperature: 22
        hvac_mode: heat

# ==========================================
# HUMIDITY-BASED HEATING
# ==========================================

# High humidity boost heating
- id: heating_humidity_boost
  alias: "Winter: Heating boost for high humidity"
  trigger:
    platform: numeric_state
    entity_id: sensor.indoor_humidity
    above: 70
  action:
    - service: climate.set_temperature
      target:
        entity_id:
          - climate.bedroom_ac
          - climate.living_room_ac
      data:
        temperature: 23  # Slightly higher to promote dehumidification
        hvac_mode: heat
    - service: notify.notify
      data:
        message: "Humidity high: Boosting heating to reduce moisture"

# ==========================================
# SEASONAL TRANSITION - Auto Mode
# ==========================================

# Spring transition - Switch to cooling mode
- id: seasonal_switch_to_cool
  alias: "Seasonal: Switch to cooling mode (>20°C for 3 days)"
  trigger:
    platform: numeric_state
    entity_id: sensor.outdoor_temp
    above: 20
    for:
      days: 3
  action:
    - service: climate.set_hvac_mode
      target:
        entity_id:
          - climate.bedroom_ac
          - climate.living_room_ac
          - climate.master_bedroom_ac
          - climate.office_ac
      data:
        hvac_mode: cool
    - service: notify.notify
      data:
        title: "🌱 Season Change"
        message: "Temperature stable above 20°C. Switched to cooling mode."

# Fall transition - Switch to heating mode
- id: seasonal_switch_to_heat
  alias: "Seasonal: Switch to heating mode (<10°C for 3 days)"
  trigger:
    platform: numeric_state
    entity_id: sensor.outdoor_temp
    below: 10
    for:
      days: 3
  action:
    - service: climate.set_hvac_mode
      target:
        entity_id:
          - climate.bedroom_ac
          - climate.living_room_ac
          - climate.master_bedroom_ac
          - climate.office_ac
      data:
        hvac_mode: heat
    - service: notify.notify
      data:
        title: "❄️ Season Change"
        message: "Temperature stable below 10°C. Switched to heating mode."

# ==========================================
# DAILY HEATING REPORT
# ==========================================

# Evening heating report
- id: heating_daily_report
  alias: "Winter: Daily heating report (8 PM)"
  trigger:
    platform: time
    at: "20:00:00"
  condition:
    - condition: numeric_state
      entity_id: sensor.outdoor_temp
      below: 15
  action:
    - service: notify.notify
      data:
        title: "🔥 Daily Heating Summary"
        message: |
          Today's Heating Usage:
          🛏️ Bedroom: 8.3 kWh
          🪑 Living Room: 9.8 kWh
          🛏️ Master: 7.2 kWh
          Total: 25.3 kWh

          Outside: {{ states('sensor.outdoor_temp') }}°C
          Energy Cost: $6.07
